<!DOCTYPE html>
<html>
<head>
  <title>ChatGPT + 포토샵 상세페이지</title>

  <style>
   body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f8f3;
  color: #222;
  line-height: 1.7;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 30px;
}

h1 {
  text-align: center;
  font-size: 42px;
  margin-bottom: 50px;
}

h2 {
  font-size: 28px;
  margin-bottom: 20px;
  border-left: 8px solid #4CAF50;
  padding-left: 14px;
}

h3 {
  font-size: 20px;
}

.section {
  background: white;
  padding: 35px;
  margin-bottom: 35px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

img, video {
  max-width: 100%;
  border-radius: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.compare {
  display: flex;
  gap: 30px;
}

.compare div {
  flex: 1;
  text-align: center;
}

.comment {
  background: #f1f8ef;
  padding: 25px;
  border-radius: 18px;
  border-left: 6px solid #4CAF50;
}

a {
  color: #2e7d32;
  font-weight: bold;
}

.back {
  display: block;
  text-align: center;
  margin-top: 50px;
  padding: 16px;
  background: #222;
  color: white;
  text-decoration: none;
  border-radius: 14px;
}

.back:hover {
  background: #4CAF50;
}
 

.link-button {
  display: block;          /* 핵심 ⭐ */
  width: 100%;             /* 화면 꽉 채우기 */
  padding: 18px;
  background-color: #4CAF50;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  font-weight: bold;
  text-align: center;      /* 글자 가운데 */
  margin-top: 15px;
  font-size: 18px;
}

.link-button:hover {
  background-color: #2e7d32;
}

.process {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;   /* ⭐ 줄바꿈 */
}

.process-card {
  flex: 1;
  background: #f1f8ef;
  padding: 16px;
  border-radius: 14px;
  text-align: center;
  border: 1px solid #d6ead2;

  height: 140px;              /* ⭐ 높이 고정 */
  display: flex;
  flex-direction: column;
  justify-content: center;    /* 세로 가운데 */
  align-items: center;        /* 가로 가운데 */
}

.process-card span {
  display: inline-block;
  margin-bottom: 10px;
  color: #2e7d32;
  font-weight: bold;
  font-size: 20px;
}

.process-card p {
  margin: 0;
  font-weight: bold;
  line-height: 1.4;   /* ⭐ 줄 간격 줄임 */
  font-size: 14px;    /* ⭐ 살짝 작게 */
}

.arrow {
  font-size: 28px;
  font-weight: bold;
  color: #4CAF50;
}

.process {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;   /* ⭐ 줄바꿈 */
}

 </style>

      <span>03</span>
      <p>포토샵에서<br>세부사항 수정</p>
    </div>

    <div class="arrow">→</div>

    <div class="process-card">
      <span>04</span>

    </div>
  </div>
</div>

</div>
